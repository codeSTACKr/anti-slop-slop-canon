name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Test validation failure modes
        run: ruby scripts/test_validate.rb
      - name: Validate repository contracts and budgets
        run: ruby scripts/validate.rb
