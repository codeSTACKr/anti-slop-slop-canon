name: Lighthouse

# Builds the static showcase and runs Lighthouse CI against the built output using
# mobile emulation (the Lighthouse default). No secrets are required: results are
# uploaded to Lighthouse CI's temporary public storage. Budgets are asserted in
# site/lighthouserc.json and match the build plan's Phase 8 gate.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/lighthouse.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/lighthouse.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.15.x autorun --config=./lighthouserc.json
